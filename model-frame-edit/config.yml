# GPU is auto-detected at runtime (torch.cuda.is_available); advisory only, matching
# the other model-* taggers.
device: cuda

model:
  # Pulled from the HuggingFace hub at load time (no baked-in local weights). The
  # Containerfile pre-downloads it into the image's HF cache so no network is hit at
  # request time.
  #
  # blip2-itm-vit-g = ViT-g + Q-Former + image/text projection heads (no LLM): the
  # retrieval checkpoint whose 256-d image embeddings are contrastively aligned to text,
  # so the same vectors serve image->image and text->image search.
  model_id: Salesforce/blip2-itm-vit-g

# runtime tunables (normalize, pooling) are defined in blip_frame/config.py's
# RuntimeConfig and injected per-request via `--params`.
